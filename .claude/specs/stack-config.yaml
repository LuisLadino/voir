# Stack Configuration
# Generated by /sync-stack on 2026-03-14

name: "voir"
version: "0.1.0"
description: "Visual Observability for Intelligent Runtimes - VS Code extension for AI coding assistant observability"

# Tech Stack
stack:
  framework: "vscode-extension"
  framework_version: "1.105+"
  language: "TypeScript"
  language_version: "5.x"
  styling: "VS Code Webview UI Toolkit + CSS"
  testing: "Vitest"
  package_manager: "pnpm"
  bundler: "esbuild"

# Active Specs
# Listed specs are loaded by /start-task before coding
specs:
  coding:
    - typescript-specs
    - vscode-extension-specs
    - vitest-specs
  architecture:
    - decisions          # 11 ADRs with research basis
    - project-structure  # Four Pillars, injection modules, governance
    - wiring             # Capture + injection diagrams
  design:
    - design-system
  config:
    - version-control
    - deployment
    - environment
    - testing
  research:
    - research-synthesis  # Maps research to architecture decisions

# Project Settings
project:
  import_alias: "@/"
  components_dir: "src/views"
  tests_dir: "test"

# Quality Gates (run before commit)
quality:
  - format
  - lint
  - type_check
  - test
  - build

# VS Code Extension Specific
extension:
  publisher: "luisladino"
  displayName: "VOIR"
  activationEvents:
    - "workspaceContains:.claude/"
    - "onCommand:voir.*"
  categories:
    - "Other"
    - "Visualization"

  # Compatibility
  # Uses standard VS Code Extension API - works on VS Code and all forks
  # Development: Antigravity IDE (VS Code fork)
  # Target: VS Code, Cursor, Windsurf, VSCodium, Antigravity, any VS Code fork
  # Distribution: VS Code Marketplace + Open VSX + direct .vsix install
  compatibility:
    api_target: "vscode ^1.105.0"
    tested_on:
      - "Antigravity IDE"
    works_on:
      - "VS Code"
      - "VS Code forks (Cursor, Windsurf, VSCodium, etc.)"
    distribution:
      - "VS Code Marketplace"
      - "Open VSX Registry"
      - "Direct .vsix install"
